<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Contact</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="modern-ui-improvements.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <div class="page-header-top">
                <button type="button" id="backBtn" class="btn-link">
                    <i class="fas fa-arrow-left"></i>
                    Contacts
                </button>
                <div class="page-header-title">
                    <h1 id="formTitle"><i class="fas fa-user-plus"></i> Add Contact</h1>
                    <p>Fill in the details to save a new contact.</p>
                </div>
            </div>
        </header>

        <div class="main-content single-column">
            <div class="form-container">
                <form id="addContactForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="nickname">Nickname</label>
                        <input type="text" id="nickname" placeholder="Optional">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="company">Company</label>
                        <input type="text" id="company" placeholder="Optional">
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" rows="2" placeholder="Optional"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" rows="3" placeholder="Optional"></textarea>
                    </div>
                    <input type="hidden" id="editId">
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">
                            <i id="submitIcon" class="fas fa-save"></i> <span id="submitText">Save Contact</span>
                        </button>
                    </div>
                </form>
                <div id="message" class="form-message hidden"></div>
            </div>
        </div>
    </div>

    <script src="add.js"></script>
</body>
</html>
